# Assassin Eyes — Nginx reverse proxy
#
# Serves the built React frontend as static files and proxies all
# backend API calls and WebSocket connections to the Uvicorn process.
#
# Setup (Ubuntu / Debian):
#   1. Build frontend:  cd frontend && npm run build
#   2. Copy/symlink this file:
#        sudo ln -s $(pwd)/deploy/nginx.conf /etc/nginx/sites-available/assassin-eyes
#        sudo ln -s /etc/nginx/sites-available/assassin-eyes /etc/nginx/sites-enabled/
#   3. Edit `server_name` and `root` below to match your environment.
#   4. Test and reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # Replace with your hostname, IP address, or domain name.
    server_name _;

    # ── Frontend static files ──────────────────────────────────────────────
    # Run `npm run build` in the frontend directory first.
    # Replace the path below with the absolute path to your frontend/dist folder.
    root /opt/wifi-radar/frontend/dist;
    index index.html;

    # React SPA — unknown routes fall back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend HTTP API ───────────────────────────────────────────────────
    location ~ ^/(calibrate|status)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── WebSocket upgrade ──────────────────────────────────────────────────
    # The browser connects to ws://your-host/ws; Nginx upgrades and
    # forwards to the backend's WebSocket endpoint on port 8000.
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive for up to 24 hours.
        # Adjust to your typical session length.
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # Disable buffering — WebSocket frames must be flushed immediately.
        proxy_buffering off;
    }
}
